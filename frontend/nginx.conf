server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Receipt photos for /api/ocr/scan can be up to 10 MB (nginx default is 1m).
    client_max_body_size 12m;

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;

    # The marketing landing at a clean URL. Must precede the SPA fallback,
    # otherwise /welcome resolves to index.html and opens the app instead.
    location = /welcome {
        try_files /landing.html =404;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API proxy — keep the /api prefix when proxying to the backend.
    #
    # The upstream goes through a variable on purpose. With a literal name
    # nginx resolves it once at startup and caches that address forever, so the
    # first `docker compose up -d backend` hands the container a new IP and
    # every /api call 502s until nginx itself is restarted. A variable forces a
    # lookup per request against Docker's embedded DNS.
    resolver 127.0.0.11 valid=10s ipv6=off;
    # Reading a receipt can outlast the 60-second default: tesseract runs on
    # one core and the remote fallback adds a round trip. A 504 there loses the
    # photo the user already waited on.
    location /api/ocr/ {
        set $ocr_upstream http://backend:8000;
        proxy_pass $ocr_upstream;
        proxy_read_timeout 180s;
        proxy_send_timeout 180s;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/ {
        set $api_upstream http://backend:8000;
        proxy_pass $api_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /sw.js {
        add_header Cache-Control "no-cache";
    }

    location = /manifest.webmanifest {
        add_header Cache-Control "no-cache";
    }
}
