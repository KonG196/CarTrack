<!doctype html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0B1119" />
    <meta name="description" content="Kapot Tracker — журнал обслуговування та витрат вашого авто" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <!-- «На головний екран» на iOS. iOS ігнорує web-manifest для standalone —
         йому потрібні саме ці Apple-теги, щоб запуск був повноекранним,
         без хрому Safari, з чорним статус-баром на темному фоні. -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Kapot" />

    <!-- Open Graph / Twitter: a shared Kapot link (a car passport, an invite)
         renders as a branded card in Telegram / Viber / Facebook instead of a
         naked URL. Per-car previews would need edge rendering; this is the
         universal baseline. -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Kapot Tracker" />
    <meta property="og:title" content="Kapot Tracker — car logbook" />
    <meta property="og:description" content="Snap a fuel receipt — Kapot Tracker creates the entry, computes your real consumption and reminds you about service in Telegram." />
    <meta property="og:url" content="https://kapot-tracker.vercel.app/" />
    <meta property="og:locale" content="en_US" />
    <meta property="og:image" content="https://kapot-tracker.vercel.app/og-en.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Kapot Tracker — car logbook: receipt scanning, Telegram assistant, maintenance & tyre tracker, economics & TCO" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Kapot Tracker — car logbook" />
    <meta name="twitter:description" content="Snap a fuel receipt — Kapot Tracker creates the entry, computes your real consumption and reminds you about service in Telegram." />
    <meta name="twitter:image" content="https://kapot-tracker.vercel.app/og-en.png" />

    <title>Kapot Tracker</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
