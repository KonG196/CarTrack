services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-kapot_tracker}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-kapot_tracker}
      POSTGRES_DB: ${POSTGRES_DB:-kapot_tracker_db}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-kapot_tracker} -d ${POSTGRES_DB:-kapot_tracker_db}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:-kapot_tracker}:${POSTGRES_PASSWORD:-kapot_tracker}@db:5432/${POSTGRES_DB:-kapot_tracker_db}
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-60}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_BOT_USERNAME: ${TELEGRAM_BOT_USERNAME:-}
      LINK_CODE_EXPIRE_MINUTES: ${LINK_CODE_EXPIRE_MINUTES:-15}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-flash-latest}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-Kapot Tracker <noreply@localhost>}
      SMTP_STARTTLS: ${SMTP_STARTTLS:-true}
      PUBLIC_URL: ${PUBLIC_URL:-http://localhost:5173}
      VERIFY_CODE_EXPIRE_HOURS: ${VERIFY_CODE_EXPIRE_HOURS:-24}
      UPLOADS_DIR: /app/uploads
      BACKUP_DIR: /app/backups
      BACKUP_KEEP: ${BACKUP_KEEP:-14}
      BACKUP_TELEGRAM_CHAT_ID: ${BACKUP_TELEGRAM_CHAT_ID:-}
    volumes:
      - uploads:/app/uploads
      - backups:/app/backups
    depends_on:
      db:
        condition: service_healthy

  # Same image as the backend, second process. Kept out of a plain
  # `docker compose up` behind a profile:
  #   docker compose --profile bot up
  bot:
    build: ./backend
    command: python -m app.bot.main
    environment:
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:-kapot_tracker}:${POSTGRES_PASSWORD:-kapot_tracker}@db:5432/${POSTGRES_DB:-kapot_tracker_db}
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_BOT_USERNAME: ${TELEGRAM_BOT_USERNAME:-}
      LINK_CODE_EXPIRE_MINUTES: ${LINK_CODE_EXPIRE_MINUTES:-15}
      BACKUP_DIR: /app/backups
      BACKUP_KEEP: ${BACKUP_KEEP:-14}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-flash-latest}
      BACKUP_TELEGRAM_CHAT_ID: ${BACKUP_TELEGRAM_CHAT_ID:-}
    volumes:
      - backups:/app/backups
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    profiles: ["bot"]

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  pgdata:
  uploads:
  backups:
